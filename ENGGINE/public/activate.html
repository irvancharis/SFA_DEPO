<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Token SFA Depo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .icon-box {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4);
        }
        h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #fde047;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .status-dot { width: 8px; height: 8px; background: #eab308; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .info-grid {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            text-align: left;
        }
        .info-item label { display: block; font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .info-item span { font-size: 14px; font-weight: 600; color: #cbd5e1; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 8px; }
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2);
        }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 6px; }
        .hint code { background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 4px; color: #a855f7; }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(168, 85, 247, 0.4); }
        .alert {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #86efac; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">🔑</div>
        <h2>Aktivasi Token SFA Depo</h2>
        <p class="subtitle">Silakan masukkan token lisensi resmi untuk mengunci koneksi depo.</p>

        <div class="status-badge">
            <span class="status-dot"></span>
            <span id="statusText">PENDING TO CONNECTED</span>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label>Target Depo</label>
                <span id="depoId">DEPO-01</span>
            </div>
            <div class="info-item">
                <label>IP Public Target</label>
                <span id="publicIp">180.252.12.89</span>
            </div>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="activateForm">
            <div class="input-group">
                <label for="tokenInput">Token Lisensi Depo</label>
                <input type="text" id="tokenInput" placeholder="Contoh: SFA-TOKEN-DEPO01-2026" required autocomplete="off">
                <p class="hint">Masukkan Token yang dibuat di <strong>SFA PUSAT</strong> (contoh: <code>SFA-TOKEN-DEPO01-2026</code>)</p>
            </div>
            <div class="input-group">
                <label for="pusatUrlInput">URL Server SFA PUSAT</label>
                <input type="text" id="pusatUrlInput" placeholder="http://localhost:3000" value="http://localhost:3000">
            </div>
            <button type="submit" id="btnSubmit">Hubungkan & Aktifkan Depo →</button>
        </form>
    </div>

    <script>
        // Load initial status
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('depoId').innerText = data.depoId || 'DEPO-01';
                document.getElementById('publicIp').innerText = data.publicIp || '127.0.0.1';
                if (data.pusatUrl) {
                    document.getElementById('pusatUrlInput').value = data.pusatUrl;
                }
                if (data.status === 'connected') {
                    window.location.href = '/dashboard.html';
                }
            });

        document.getElementById('activateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('tokenInput').value.trim();
            const pusatUrl = document.getElementById('pusatUrlInput').value.trim();
            const alertBox = document.getElementById('alertBox');
            const btn = document.getElementById('btnSubmit');

            btn.disabled = true;
            btn.innerText = 'Memverifikasi ke SFA PUSAT...';
            alertBox.style.display = 'none';

            try {
                const res = await fetch('/api/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, pusatUrl })
                });

                const data = await res.json();
                if (data.success) {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = '✅ ' + (data.message || 'Aktivasi Berhasil! Terhubung ke SFA PUSAT.');
                    alertBox.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1200);
                } else {
                    alertBox.className = 'alert alert-error';
                    alertBox.innerText = '❌ ' + (data.message || 'Token tidak valid!');
                    alertBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Hubungkan & Aktifkan Depo →';
                }
            } catch (err) {
                alertBox.className = 'alert alert-error';
                alertBox.innerText = '❌ Gagal terhubung ke server.';
                alertBox.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Hubungkan & Aktifkan Depo →';
            }
        });
    </script>
</body>
</html>
